<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal Siaga Desa</title>

<link rel="icon" href="data:,">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body,html{
  margin:0;
  padding:0;
  font-family:Segoe UI;
  background:#0d1b2a;
  color:white;
}
header{
  background:#b71c1c;
  padding:15px;
  text-align:center;
}
header h1{
  color:#ffcc00;
  margin:0;
}
.container{
  background:#1b2a41;
  padding:20px;
  margin:20px auto;
  border-radius:10px;
  max-width:400px;
  width:90%;
}
input,select,button{
  width:100%;
  padding:10px;
  margin-bottom:15px;
  border:none;
  border-radius:5px;
}
button{
  background:#ffcc00;
  font-weight:bold;
  cursor:pointer;
}
#map{
  height:400px;
  margin:20px;
  border-radius:10px;
  border:2px solid #ffcc00;
}
.blink-marker{
  width:25px;
  height:25px;
  border-radius:50%;
  background:red;
  animation:blink 1s infinite;
}
@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0;}
  100%{opacity:1;}
}
</style>
</head>
<body>

<header>
<h1>PORTAL LAPOR SIAGA DESA</h1>
</header>

<div class="container">

<form id="laporForm">
<input id="nama" placeholder="Nama Pelapor" required>

<select id="kondisi" required>
<option value="">-- Pilih Kondisi --</option>
<option>Banjir</option>
<option>Kebakaran</option>
<option>Kecelakaan</option>
<option>Pencurian</option>
<option>Longsor</option>
<option>Lainnya</option>
</select>

<button type="submit">Kirim Laporan</button>
</form>

<button id="aktifkanBtn">🔔 Aktifkan Notifikasi & Alarm</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-messaging-compat.js"></script>

<script>

// ================= FIREBASE =================
firebase.initializeApp({
  apiKey:"AIzaSyAo-nP5XZGK8NqMsjSiHb64--qqUZgB_eM",
  authDomain:"siagadesa10.firebaseapp.com",
  databaseURL:"https://siagadesa10-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"siagadesa10",
  messagingSenderId:"24091093796",
  appId:"1:24091093796:web:6773efecd9f7a6f4e0a1b1"
});

const db = firebase.database();
const messaging = firebase.messaging();

// ================= MAP =================
const map = L.map('map').setView([-7.9666,113.8021],14);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let lastMarker = null;

// ================= AUDIO =================
const audioMap = {
  Banjir: new Audio("banjir.mp3"),
  Kebakaran: new Audio("kebakaran.mp3"),
  Kecelakaan: new Audio("kecelakaan.mp3"),
  Pencurian: new Audio("pencurian.mp3"),
  Longsor: new Audio("longsor.mp3"),
  Lainnya: new Audio("lainnya.mp3")
};

let suaraAktif = false;

function bunyikanAlarm(kondisi){

  if(!suaraAktif) return;
  if(!audioMap[kondisi]) return;

  Object.values(audioMap).forEach(a=>{
    a.pause();
    a.currentTime=0;
  });

  audioMap[kondisi].loop=true;
  audioMap[kondisi].play();

  setTimeout(()=>{
    audioMap[kondisi].pause();
    audioMap[kondisi].currentTime=0;
  },30000);
}

// ================= AKTIFKAN NOTIF =================
document.getElementById("aktifkanBtn")
.addEventListener("click", function(){

  Object.values(audioMap).forEach(a=>{
    a.play().then(()=>a.pause()).catch(()=>{});
  });

  suaraAktif=true;

  Notification.requestPermission()
  .then(permission=>{

    if(permission==="granted"){

      navigator.serviceWorker.register("firebase-messaging-sw.js")
      .then(reg=>{

        return messaging.getToken({
          vapidKey:"BAowwfotejVH-EafLmZ9lzYhyoQUWmuQV0kmhmlrznDpsU11UvieHdl7s-PUrsY24rnD0A83gaR5q8l94-RBuog",
          serviceWorkerRegistration:reg
        });

      })
      .then(token=>{

        if(token){
          db.ref("tokens/"+token).set({
            token:token,
            createdAt:Date.now()
          });
          alert("Notifikasi & Alarm Aktif ✅");
        }

      });

    }

  });

});

// ================= KIRIM LAPORAN =================
document.getElementById("laporForm")
.addEventListener("submit", function(e){

  e.preventDefault();

  navigator.geolocation.getCurrentPosition(function(pos){

    db.ref("laporan").push({
      nama:nama.value,
      kondisi:kondisi.value,
      lat:pos.coords.latitude,
      lon:pos.coords.longitude,
      timestamp:Date.now()
    });

    alert("Laporan Terkirim");
    laporForm.reset();

  });

});

// ================= REALTIME LISTENER =================
db.ref("laporan").limitToLast(1).on("child_added", function(snapshot){

  const data=snapshot.val();
  if(!data) return;

  const kondisi=data.kondisi;
  const nama=data.nama;

  if(lastMarker) map.removeLayer(lastMarker);

  lastMarker=L.marker([data.lat,data.lon],{
    icon:L.divIcon({className:"blink-marker"})
  }).addTo(map)
  .bindPopup("🚨 "+kondisi+"<br>Pelapor: "+nama)
  .openPopup();

  map.setView([data.lat,data.lon],14);

  if(Notification.permission==="granted"){

    navigator.serviceWorker.getRegistration()
    .then(reg=>{
      if(reg){
        reg.showNotification("🚨 Laporan Darurat Baru",{
          body:kondisi+" dilaporkan oleh "+nama,
          icon:"https://cdn-icons-png.flaticon.com/512/565/565547.png"
        });
      }
    });

  }

  bunyikanAlarm(kondisi);

});

</script>

</body>
</html>
